async function sendEmail({to,subject,html}){
  try{

-- Run this in Supabase SQL Editor

create table if not exists pf_users (
  id text primary key,
  name text, email text unique, pw text,
  role text default 'employee',
  dept text default 'Gummy',
  loc text default 'Missouri',
  approved boolean default false,
  perms jsonb default '[]',
  lead_stage text
);

create table if not exists pf_work_orders (
  id text primary key,
  product text, sku text, qty int,
  loc text, created text,
  assigned_to text, stage text,
  status text default 'not_started',
  stages jsonb default '{}',
  hold boolean default false,
  hold_reason text default '',
  notes text default '',
  stage_counts jsonb default '{}',
  stage_wastes jsonb default '{}'
);

create table if not exists pf_inventory (
  id text primary key,
  sku text, name text, dept text,
  qty int, min_qty int, unit text
);

create table if not exists pf_sops (
  id text primary key,
  title text, depts jsonb default '[]',
  date text, by_user text,
  acks jsonb default '{}',
  file_name text,
  file_data text,
  file_type text
);

-- Disable RLS for now (enable later for production)
alter table pf_users disable row level security;
alter table pf_work_orders disable row level security;
alter table pf_inventory disable row level security;
alter table pf_sops disable row level security;
`;

function StatusBadge({s}){
  const m={completed:['bb-green','✓ Completed'],in_progress:['bb-blue','● In Progress'],not_started:['bb-gray','○ Not Started'],on_hold:['bb-red','⏸ On Hold'],test_failed:['bb-red','✗ Failed']};
  const[cls,label]=m[s]||['bb-gray',s];
  return el('span',{className:`badge ${cls}`},label);
}

function Toggle({checked,onChange}){
  return el('label',{className:'toggle'},el('input',{type:'checkbox',checked:!!checked,onChange:ev=>onChange(ev.target.checked)}),el('span',{className:'tslider'}));
}

function PermGrid({perms,onChange}){
  const secs={};
  Object.entries(PERMS).forEach(([k,{label,sec}])=>{if(!secs[sec])secs[sec]=[];secs[sec].push({k,label});});
  return el('div',null,Object.entries(secs).map(([sec,items])=>
    el('div',{key:sec,className:'perm-section'},
      el('div',{className:'perm-sec-title'},sec),
      el('div',{className:'perm-grid'},items.map(({k,label})=>
        el('div',{key:k,className:'perm-item'},el('div',{className:'perm-label'},label),el(Toggle,{checked:(perms||[]).includes(k),onChange:v=>onChange(k,v)}))
      ))
    )
  ));
}

// ── AUTH ─────────────────────────────────────────────────────────────────────
function Auth({onLogin}){
  const[tab,setTab]=useState('login');
  const[f,setF]=useState({name:'',email:'',pw:'',dept:'Gummy',loc:'Missouri'});
  const[msg,setMsg]=useState('');
  const[pend,setPend]=useState(false);
  const[loading,setLoading]=useState(false);

  async function login(){
    setLoading(true);setMsg('');
    try{
      const users=await db.get('pf_users',`email=eq.${encodeURIComponent(f.email)}`);
      if(!users.length){setMsg('Invalid email or password.');setLoading(false);return;}
      const u=users[0];
      if(u.pw!==f.pw){setMsg('Invalid email or password.');setLoading(false);return;}
      if(!u.approved){setPend(true);setLoading(false);return;}
      const userData={...u,perms:u.perms||[],leadStage:u.lead_stage};localStorage.setItem('pf_session',JSON.stringify(userData));onLogin(userData);
    }catch(err){setMsg('Connection error. Please try again.');console.error(err);}
    setLoading(false);
  }

  async function register(){
    if(!f.name||!f.email||!f.pw){setMsg('Please fill all fields.');return;}
    setLoading(true);setMsg('');
    try{
      const exists=await db.get('pf_users',`email=eq.${encodeURIComponent(f.email)}`);
      if(exists.length){setMsg('Email already registered.');setLoading(false);return;}
      await db.insert('pf_users',{id:'u'+Date.now(),name:f.name,email:f.email,pw:f.pw,role:'employee',dept:f.dept,loc:f.loc,approved:false,perms:[],lead_stage:null});
      setPend(true);
    }catch(err){setMsg('Error creating account. Please try again.');console.error(err);}
    setLoading(false);
  }

  if(pend)return el('div',{className:'auth-wrap'},el('div',{className:'auth-box'},
    el('div',{className:'logo'},'Pro',el('span',null,'Flow')),
    el('div',{className:'pending-box'},
      el('div',{style:{fontSize:32,marginBottom:10}},'⏳'),
      el('div',{style:{fontWeight:700,fontSize:15,marginBottom:8}},'Account Pending Approval'),
      el('div',{style:{fontSize:13,color:'#fcd34d',lineHeight:1.5}},'Your account has been submitted. An administrator will review and approve your access before you can log in.'),
    ),
    el('button',{className:'btn-primary',style:{marginTop:16},onClick:()=>{setPend(false);setTab('login');}},'Back to Sign In'),
  ));

  return el('div',{className:'auth-wrap'},el('div',{className:'auth-box'},
    el('div',{className:'logo'},'Pro',el('span',null,'Flow')),
    el('div',{className:'auth-sub'},'Cannabis Production Management System'),
    el('div',{className:'auth-tabs'},
      el('button',{className:`atab ${tab==='login'?'on':''}`,onClick:()=>{setTab('login');setMsg('');}}, 'Sign In'),
      el('button',{className:`atab ${tab==='reg'?'on':''}`,onClick:()=>{setTab('reg');setMsg('');}}, 'Register'),
    ),
    msg&&el('div',{className:'alert al-red',style:{marginBottom:12}},msg),
    tab==='login'?el('div',null,
      el('div',{className:'fg'},el('label',null,'Email'),el('input',{type:'email',placeholder:'you@company.com',value:f.email,onChange:ev=>setF(p=>({...p,email:ev.target.value}))})),
      el('div',{className:'fg'},el('label',null,'Password'),el('input',{type:'password',placeholder:'••••••••',value:f.pw,onChange:ev=>setF(p=>({...p,pw:ev.target.value})),onKeyDown:ev=>ev.key==='Enter'&&login()})),
      el('button',{className:'btn-primary',onClick:login,disabled:loading},loading?'Signing in...':'Sign In'),
    ):el('div',null,
      el('div',{className:'fg'},el('label',null,'Full Name'),el('input',{placeholder:'John Smith',value:f.name,onChange:ev=>setF(p=>({...p,name:ev.target.value}))})),
      el('div',{className:'fg'},el('label',null,'Email'),el('input',{type:'email',value:f.email,onChange:ev=>setF(p=>({...p,email:ev.target.value}))})),
      el('div',{className:'fg'},el('label',null,'Password'),el('input',{type:'password',value:f.pw,onChange:ev=>setF(p=>({...p,pw:ev.target.value}))})),
      el('div',{className:'fg'},el('label',null,'Department'),el('select',{value:f.dept,onChange:ev=>setF(p=>({...p,dept:ev.target.value}))},DEPTS.map(d=>el('option',{key:d,value:d},d)))),
      el('div',{className:'fg'},el('label',null,'Location'),el('select',{value:f.loc,onChange:ev=>setF(p=>({...p,loc:ev.target.value}))},LOCS.map(l=>el('option',{key:l,value:l},l)))),
      el('button',{className:'btn-primary',onClick:register,disabled:loading},loading?'Submitting...':'Request Access'),
      el('div',{className:'auth-note'},'An admin will review and approve your account before you can log in.'),
    )
  ));
}

// ── WORK ORDERS ──────────────────────────────────────────────────────────────
function WorkOrders({wos,setWos,cu,users,inv,boms}){
  const[showNew,setNew]=useState(false);
  const[sel,setSel]=useState(null);
  const[filter,setFilter]=useState('all');
  const[f,setF]=useState({product:'Gummy',sku:'',qty:'',loc:'Missouri',assignedTo:'',notes:''});
  const[saving,setSaving]=useState(false);
  const canCreate=hp(cu,'create_work_orders');
  const canHold=hp(cu,'place_hold');
  const canUpdate=hp(cu,'update_stage');

  const visible=useMemo(()=>{
    let list=wos;
    if(cu.role==='supervisor')list=list.filter(w=>w.loc===cu.loc&&Object.keys(w.stages||{}).some(s=>sdept(w.product,s)===cu.dept));
    else if(cu.role==='lead')list=list.filter(w=>cu.leadStage&&(w.stages||{})[cu.leadStage]!==undefined&&w.loc===cu.loc);
    else if(cu.role==='employee')list=[];
    if(filter==='hold')return list.filter(w=>w.hold);
    if(filter!=='all')return list.filter(w=>w.product===filter);
    return list;
  },[wos,cu,filter]);

  async function create(){
    if(!f.sku||!f.qty)return;
    setSaving(true);
    const qty=parseInt(f.qty);
    const stages={};getWorkflow(f.product,f.loc).forEach(s=>stages[s]='not_started');
    const wo={id:'WO-'+Date.now(),product:f.product,sku:f.sku,qty,loc:f.loc,created:new Date().toISOString().slice(0,10),assigned_to:f.assignedTo||cu.name,stage:getWorkflow(f.product,f.loc)[0],status:'not_started',stages,hold:false,hold_reason:'',notes:f.notes,stage_counts:{},stage_wastes:{}};
    await db.insert('pf_work_orders',wo);

    // Auto-deduct inventory based on BOM
    const matchedBom=boms.find(b=>b.sku===f.sku||b.product===f.product);
    if(matchedBom){
      const deductions=[];
      for(const item of (matchedBom.items||[])){
        if(!item.inv_sku)continue;
        const invItem=inv.find(i=>i.sku===item.inv_sku);
        if(invItem){
          const needed=Math.ceil(qty*item.qty_per_unit);
          const newQty=Math.max(0,invItem.qty-needed);
          try{await db.update('pf_inventory',invItem.id,{qty:newQty});}catch(e){console.error(e);}
          deductions.push({id:invItem.id,qty:newQty});
        }
      }
      if(deductions.length>0){
        setInv(p=>p.map(i=>{const d=deductions.find(x=>x.id===i.id);return d?{...i,qty:d.qty}:i;}));
      }
    }

    setWos(p=>[{...wo,assignedTo:wo.assigned_to},...p]);
    setF({product:'Gummy',sku:'',qty:'',loc:'Missouri',assignedTo:'',notes:''});setNew(false);setSaving(false);
  }

  const[showComplete,setShowComplete]=useState(null);
  const[invAlert,setInvAlert]=useState(null);
  const[approvalNote,setApprovalNote]=useState('');
  const[stageCount,setStageCount]=useState('');
  const[stageWaste,setStageWaste]=useState('');
  const[wasteReason,setWasteReason]=useState('');

  async function advance(wo){
    if(wo.hold||!canUpdate)return;
    const wf=getWorkflow(wo.product,wo.loc),ci=wf.indexOf(wo.stage);
    let update={};
    if(wo.status==='not_started'){
      // Check BOM before starting first stage only — only if a BOM exists
      if(wo.stage===getWorkflow(wo.product,wo.loc)[0]){
        const dynamicBom=boms.find(b=>b.sku===wo.sku||b.product===wo.product);
        if(dynamicBom&&dynamicBom.items&&dynamicBom.items.length>0){
          const bomCheck=checkDynamicBOM(wo,inv,dynamicBom);
          if(!bomCheck.allGood){
            const hwMissing=bomCheck.missing.filter(m=>m.type==='hardware');
            const pkgMissing=bomCheck.missing.filter(m=>m.type==='packaging');
            if(hwMissing.length>0){
              setInvAlert({type:'block',wo,missing:bomCheck.missing,sufficient:bomCheck.sufficient});
              return;
            } else if(pkgMissing.length>0){
              setInvAlert({type:'approval',wo,missing:pkgMissing,sufficient:bomCheck.sufficient});
              return;
            }
          }
        }
        // No BOM found or all materials available — proceed normally
      }
      update={status:'in_progress',stages:{...wo.stages,[wo.stage]:'in_progress'}};
      await db.update('pf_work_orders',wo.id,update);
      setWos(p=>p.map(w=>w.id===wo.id?{...w,...update}:w));
      setSel(null);
    } else if(wo.status==='in_progress'){
      // Show count/waste dialog before completing
      setShowComplete(wo);
      setStageCount('');setStageWaste('');setWasteReason('');
    }
  }

  async function completeStage(wo){
    if(wo.hold||!canUpdate)return;
    const wf=getWorkflow(wo.product,wo.loc),ci=wf.indexOf(wo.stage);
    const stageCounts=wo.stage_counts||{};
    const stageWastes=wo.stage_wastes||{};
    stageCounts[wo.stage]={count:parseInt(stageCount)||0,by:cu.name,at:new Date().toISOString().slice(0,10)};
    stageWastes[wo.stage]={waste:parseInt(stageWaste)||0,reason:wasteReason,by:cu.name,at:new Date().toISOString().slice(0,10)};
    let update={};
    if(ci<wf.length-1){const next=wf[ci+1];update={stage:next,status:'not_started',stages:{...wo.stages,[wo.stage]:'completed',[next]:'not_started'},stage_counts:stageCounts,stage_wastes:stageWastes};}
    else update={status:'completed',stages:{...wo.stages,[wo.stage]:'completed'},stage_counts:stageCounts,stage_wastes:stageWastes};
    await db.update('pf_work_orders',wo.id,update);
    setWos(p=>p.map(w=>w.id===wo.id?{...w,...update}:w));
    setShowComplete(null);setSel(null);
  }

  async function toggleHold(wo){
    if(!canHold)return;
    const update={hold:!wo.hold,hold_reason:wo.hold?'':('Administrative Hold — '+cu.name)};
    await db.update('pf_work_orders',wo.id,update);
    setWos(p=>p.map(w=>w.id===wo.id?{...w,...update}:w));
    setSel(null);
  }

  async function testResult(wo,res){
    const wf=getWorkflow(wo.product,wo.loc),ci=wf.indexOf(wo.stage),next=res==='pass'?wf[ci+1]:null;
    const update={stage:res==='pass'?next:wo.stage,status:'not_started',stages:{...wo.stages,[wo.stage]:res==='pass'?'completed':'test_failed'},hold:res==='fail',hold_reason:res==='fail'?'Test Failed — Awaiting Review':wo.hold_reason};
    await db.update('pf_work_orders',wo.id,update);
    setWos(p=>p.map(w=>w.id===wo.id?{...w,...update}:w));
    setSel(null);
  }

  function canAct(wo){
    if(wo.hold)return false;// HOLD IS ABSOLUTE - nobody can advance
    if(!canUpdate)return false;
    if(cu.role==='admin'||cu.role==='manager')return true;
    if(cu.role==='supervisor')return sdept(wo.product,wo.stage)===cu.dept;
    if(cu.role==='lead')return cu.leadStage===wo.stage;
    return false;
  }

  return el('div',null,
    el('div',{className:'ph'},el('div',null,el('div',{className:'pt'},'Work Orders'),el('div',{className:'ps'},'Track production batches')),canCreate&&el('button',{className:'btn b-blue',onClick:()=>setNew(true)},'+ New Work Order')),
    el('div',{className:'tabs'},['all','Gummy','Cartridge','Pre-Roll','hold'].map(fl=>el('button',{key:fl,className:`tab ${filter===fl?'on':''}`,onClick:()=>setFilter(fl)},fl==='hold'?'⏸ On Hold':fl==='all'?'All':fl))),
    el('div',{className:'card',style:{padding:0}},el('div',{className:'tw'},

function Inventory({inv,setInv,cu,boms}){
  // Build master catalog from all BOM items
  const catalog=React.useMemo(()=>{
    const items={};
    (boms||[]).forEach(bom=>{
      (bom.items||[]).forEach(item=>{
        if(item.inv_sku&&!item.inv_sku.startsWith('MI-')&&!items[item.inv_sku]){
          // Determine type
          let type='material',unit='g';
          if(item.uom==='pcs'){type='hardware';unit='pcs';}
          else if(item.inv_sku.startsWith('RT-')){type='terpene';}
          else if(item.inv_sku.startsWith('RO-')){type='oil';}
          else if(item.inv_sku.startsWith('RF')||item.inv_sku.startsWith('RC-')){type='flower';}
          items[item.inv_sku]={sku:item.inv_sku,name:item.name||item.inv_sku,type,unit};
        }
      });
    });
    return Object.values(items);
  },[boms]);

function QMS({sops,setSops,cu,users}){
  const[showUp,setUp]=useState(false);
  const[sel,setSel]=useState(null);
  const[f,setF]=useState({title:'',depts:[]});
  const isAdmin=cu.role==='admin';
  const canUpload=isAdmin||hp(cu,'upload_sops');
  const[uploading,setUploading]=useState(false);
  const[emailStatus,setEmailStatus]=useState('');
  const[openedSops,setOpenedSops]=useState(new Set());
  const[revising,setRevising]=useState(null);
  // Admin sees all, others see their dept SOPs
  const mySops=isAdmin?sops:sops.filter(s=>(s.depts||[]).some(d=>d===cu.dept||d==='All'));

  async function upload(){
    if(!f.title||f.depts.length===0)return;
    setUploading(true);
    const recipients=users.filter(u=>u.approved&&f.depts.includes(u.dept)&&u.email);
    const acks={};
    recipients.forEach(u=>{acks[u.id]={signed:false};});

    if(revising){
      // Revising existing SOP — reset all sigs, update version
      const updatedTitle=f.title+(f.title===revising.title?' (Revised '+new Date().toISOString().slice(0,10)+')':''  );
      const updated={title:updatedTitle,depts:f.depts,date:new Date().toISOString().slice(0,10),by_user:cu.name,acks,
        file_name:f.fileName||revising.file_name,
        file_data:f.fileData||revising.file_data,
        file_type:f.fileType||revising.file_type
      };
      try{await db.update('pf_sops',revising.id,updated);}catch(e){console.error('SOP update error:',e);}
      setSops(p=>p.map(s=>s.id===revising.id?{...s,...updated}:s));
      // Notify everyone again
      if(recipients.length>0){
        const results=await sendSOPNotification({...revising,...updated},recipients);
        const sent=results.filter(r=>r.status==='fulfilled'&&r.value?.ok).length;
        setEmailStatus(`✓ SOP revised — all signatures reset and ${sent}/${recipients.length} email${sent!==1?'s':''} sent`);
      }
      setRevising(null);
    } else {
      // New SOP
      const sop={id:'s'+Date.now(),title:f.title,depts:f.depts,date:new Date().toISOString().slice(0,10),by_user:cu.name,acks,file_name:f.fileName||null,file_data:f.fileData||null,file_type:f.fileType||null};
      try{await db.insert('pf_sops',sop);}catch(e){console.error('SOP insert error:',e);}
      setSops(p=>[sop,...p]);
      if(recipients.length>0){
        const results=await sendSOPNotification(sop,recipients);
        const sent=results.filter(r=>r.status==='fulfilled'&&r.value?.ok).length;
        setEmailStatus(`✓ SOP uploaded and ${sent}/${recipients.length} email${sent!==1?'s':''} sent successfully`);
      }
    }
    setF({title:'',depts:[]});setUp(false);setUploading(false);
  }

  async function deleteSop(sid){
    if(!window.confirm('Delete this SOP? This cannot be undone.'))return;
    try{await db.remove('pf_sops',sid);}catch(e){console.error(e);}
    setSops(p=>p.filter(s=>s.id!==sid));
  }

  async function ack(sid){
    const sop=sops.find(s=>s.id===sid);if(!sop)return;
    const newAcks={...(sop.acks||{}),[cu.id]:{signed:true,date:new Date().toISOString().slice(0,10),name:cu.name}};
    try{
      await db.update('pf_sops',sid,{acks:newAcks});
      setSops(p=>p.map(s=>s.id===sid?{...s,acks:newAcks}:s));
    }catch(e){
      console.error('Ack error:',e);
      alert('Error signing SOP. Please try again.');
    }
  }

  return el('div',null,
    el('div',{className:'ph'},
      el('div',null,el('div',{className:'pt'},'QMS / SOPs'),el('div',{className:'ps'},'Standard Operating Procedures & Acknowledgments')),
      canUpload&&el('button',{className:'btn b-blue',onClick:()=>setUp(true)},'+ Upload SOP'),
    ),
    emailStatus&&el('div',{className:'alert al-blue',style:{marginBottom:14,cursor:'pointer'},onClick:()=>setEmailStatus('')},emailStatus),
    mySops.length===0?el('div',{className:'empty'},
      el('div',{className:'eico'},'📄'),
      el('div',{className:'etxt'},'No SOPs yet'),
      el('div',{style:{fontSize:12,color:'var(--text3)',marginTop:6}},isAdmin?'Click "+ Upload SOP" to add your first SOP':'No SOPs have been assigned to your department yet'),
    ):
    mySops.map(sop=>{
      const al=Object.entries(sop.acks||{});
      const signed=al.filter(([,v])=>v.signed).length;
      const total=al.length;
      const myAck=(sop.acks||{})[cu.id];
      const alreadySigned=myAck&&myAck.signed;
      const needsSig=!alreadySigned&&(sop.depts||[]).includes(cu.dept);
      const hasOpened=(openedSops||new Set()).has(sop.id);
      return el('div',{key:sop.id,className:'card',style:{marginBottom:12}},
        el('div',{className:'flex aic',style:{justifyContent:'space-between',marginBottom:10}},
          el('div',{style:{flex:1}},
            el('div',{className:'flex aic g2x',style:{flexWrap:'wrap'}},
              el('div',{className:'fw6'},sop.title),
              needsSig&&!hasOpened&&el('span',{className:'badge bb-yellow'},'⚠ Must Open First'),
              needsSig&&hasOpened&&el('span',{className:'badge bb-orange',style:{background:'rgba(249,115,22,.12)',color:'var(--orange)'}},'✍ Ready to Sign'),

            ),
            el('div',{className:'tsm c-muted',style:{marginTop:4}},`Uploaded ${sop.date} by ${sop.by_user} · Departments: ${(sop.depts||[]).join(', ')}`),
            el('div',{style:{display:'flex',alignItems:'center',gap:8,marginTop:8}},
              el('div',{className:'pw',style:{width:100}},el('div',{className:`pf ${signed===total&&total>0?'p-green':'p-yellow'}`,style:{width:total>0?(signed/total*100)+'%':'0%'}})),
              el('span',{className:'tsm c-muted'},`${signed}/${total} acknowledged`),
            ),
          ),
        ),
        el('div',{style:{display:'flex',gap:8,flexWrap:'wrap'}},
          // Open/View button — always available if file exists
          sop.file_data&&el('button',{className:'btn b-blue btn-sm',onClick:()=>{

  async function approve(apr){
    // Start the work order
    const wo=wos.find(w=>w.id===apr.wo_id);
    if(wo){
      const update={status:'in_progress',stages:{...wo.stages,[wo.stage]:'in_progress'}};
      await db.update('pf_work_orders',wo.id,update);
      setWos(p=>p.map(w=>w.id===wo.id?{...w,...update}:w));
    }
    const update={status:'approved',approved_by:cu.name,approved_at:new Date().toISOString().slice(0,10)};
    try{await db.update('pf_approvals',apr.id,update);}catch(e){console.log(e);}
    setApprovals(p=>p.map(a=>a.id===apr.id?{...a,...update}:a));
  }

  async function deny(apr){
    const update={status:'denied',approved_by:cu.name,approved_at:new Date().toISOString().slice(0,10)};

  return el('div',null,

    pending.map(apr=>el('div',{key:apr.id,className:'card',style:{marginBottom:14}},

        el('div',null,
          el('div',{className:'flex aic g2x'},el('span',{className:'mono tsm c-blue'},apr.wo_id),el('span',{className:'badge bb-yellow'},'⏳ Pending')),
          el('div',{className:'fw6',style:{marginTop:4}},apr.wo_sku),
          el('div',{className:'tsm c-muted'},`${apr.product} · ${apr.qty?.toLocaleString()} units · Requested by ${apr.requested_by} on ${apr.created_at}`),
        ),
        el('div',{style:{display:'flex',gap:8}},
          el('button',{className:'btn b-green',onClick:()=>approve(apr)},'✓ Approve & Start'),
          el('button',{className:'btn b-red',onClick:()=>deny(apr)},'✗ Deny'),

      apr.note&&el('div',{className:'alert al-blue',style:{marginBottom:10}},`Note: ${apr.note}`),

        el('span',{className:'tsm'},item.name),
        el('span',{className:'tsm c-red'},`Short ${item.shortage?.toLocaleString()} units`),

    done.length>0&&el('div',null,
      el('div',{className:'divider'}),
      el('div',{className:'fw6 mb4'},'Resolved'),
      done.slice(0,10).map(apr=>el('div',{key:apr.id,style:{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid var(--border)'}},
        el('div',null,el('div',{className:'fw6 tsm'},apr.wo_sku),el('div',{className:'tsm c-muted'},`${apr.requested_by} · ${apr.created_at}`)),
        el('span',{className:`badge ${apr.status==='approved'?'bb-green':'bb-red'}`},apr.status==='approved'?'✓ Approved':'✗ Denied'),

}

// ── TASKS ────────────────────────────────────────────────────────────────────
const TASK_SECTIONS=['R&D','Special Projects','Production Investigation','HR','General'];
const TASK_PRIORITIES={low:{label:'Low',color:'bb-gray'},medium:{label:'Medium',color:'bb-blue'},high:{label:'High',color:'bb-yellow'},urgent:{label:'Urgent',color:'bb-red'}};

function Tasks({tasks,setTasks,cu,users}){
  const[section,setSection]=useState('All');
  const[showNew,setNew]=useState(false);
  const[selected,setSelected]=useState(null);
  const[filter,setFilter]=useState('open');
  const[newNote,setNewNote]=useState('');
  const[saving,setSaving]=useState(false);
  const[f,setF]=useState({title:'',section:'R&D',description:'',assigned_to:'',assigned_id:'',due_date:'',priority:'medium'});

  const today=new Date().toISOString().slice(0,10);
  const tomorrow=new Date(Date.now()+86400000).toISOString().slice(0,10);

  const visible=tasks.filter(t=>{
    if(filter==='open'&&t.status!=='open') return false;
    if(filter==='done'&&t.status!=='done') return false;
    if(filter==='archived'&&t.status!=='archived') return false;
    if(section!=='All'&&t.section!==section) return false;
    return true;
  });

  const dueToday=tasks.filter(t=>t.status==='open'&&t.due_date===today).length;
  const dueTomorrow=tasks.filter(t=>t.status==='open'&&t.due_date===tomorrow).length;
  const overdue=tasks.filter(t=>t.status==='open'&&t.due_date&&t.due_date<today).length;
  const updatedToday=tasks.filter(t=>t.updated_at&&t.updated_at.slice(0,10)===today).length;

  async function createTask(){
    if(!f.title)return;
    setSaving(true);
    const task={
      id:'task-'+Date.now(),
      title:f.title,section:f.section,description:f.description,
      assigned_to:f.assigned_to,assigned_id:f.assigned_id,
      due_date:f.due_date,priority:f.priority,
      status:'open',created_by:cu.name,
      created_at:new Date().toISOString(),
      updated_at:new Date().toISOString(),
      updated_by:cu.name,
      notes:[],attachments:[],
    };
    try{await db.insert('pf_tasks',task);}catch(e){console.error(e);}
    setTasks(p=>[task,...p]);
    setF({title:'',section:'R&D',description:'',assigned_to:'',assigned_id:'',due_date:'',priority:'medium'});
    setNew(false);setSaving(false);
  }

  async function addNote(){
    if(!newNote.trim()||!selected)return;
    const note={id:'n'+Date.now(),text:newNote,by:cu.name,at:new Date().toISOString()};
    const updated={...selected,notes:[...(selected.notes||[]),note],updated_at:new Date().toISOString(),updated_by:cu.name};
    try{await db.update('pf_tasks',selected.id,{notes:updated.notes,updated_at:updated.updated_at,updated_by:updated.updated_by});}catch(e){console.error(e);}
    setTasks(p=>p.map(t=>t.id===selected.id?updated:t));
    setSelected(updated);setNewNote('');
  }

  async function approve(task){
    const updated={...task,status:'done',approved_by:cu.name,approved_at:new Date().toISOString(),updated_at:new Date().toISOString(),updated_by:cu.name};
    try{await db.update('pf_tasks',task.id,{status:'done',approved_by:cu.name,approved_at:updated.approved_at,updated_at:updated.updated_at,updated_by:cu.name});}catch(e){console.error(e);}
    setTasks(p=>p.map(t=>t.id===task.id?updated:t));
    setSelected(null);
  }

  async function archive(task){
    const updated={...task,status:'archived',updated_at:new Date().toISOString(),updated_by:cu.name};
    try{await db.update('pf_tasks',task.id,{status:'archived',updated_at:updated.updated_at,updated_by:cu.name});}catch(e){console.error(e);}
    setTasks(p=>p.map(t=>t.id===task.id?updated:t));
    setSelected(null);
  }

  async function deleteTask(id){
    if(!window.confirm('Delete this task?'))return;
    try{await db.remove('pf_tasks',id);}catch(e){console.error(e);}
    setTasks(p=>p.filter(t=>t.id!==id));
    setSelected(null);
  }

  async function updateField(task,field,value){
    const updated={...task,[field]:value,updated_at:new Date().toISOString(),updated_by:cu.name};
    try{await db.update('pf_tasks',task.id,{[field]:value,updated_at:updated.updated_at,updated_by:cu.name});}catch(e){console.error(e);}
    setTasks(p=>p.map(t=>t.id===task.id?updated:t));
    setSelected(updated);
  }

  function getDueColor(due){
    if(!due) return '';
    if(due<today) return 'c-red';
    if(due===today) return 'c-yellow';
    if(due===tomorrow) return 'c-blue';
    return 'c-muted';
  }

  function getDueLabel(due){
    if(!due) return 'No due date';
    if(due<today) return '⚠ Overdue';
    if(due===today) return '🔴 Due Today';
    if(due===tomorrow) return '🟡 Due Tomorrow';
    return due;
  }

  const priColor=p=>TASK_PRIORITIES[p]?.color||'bb-gray';
  const priLabel=p=>TASK_PRIORITIES[p]?.label||p;

  return el('div',null,
    // Header
    el('div',{className:'ph'},
      el('div',null,el('div',{className:'pt'},'Tasks'),el('div',{className:'ps'},'Manage tasks across R&D, Projects, Production, and HR')),
      el('button',{className:'btn b-blue',onClick:()=>setNew(true)},'+ New Task'),
    ),

    // Stats row
    el('div',{className:'g4',style:{marginBottom:20}},
      [{l:'Due Today',v:dueToday,c:dueToday>0?'c-red':'c-muted',click:()=>{setFilter('open');setSection('All');}},
       {l:'Due Tomorrow',v:dueTomorrow,c:dueTomorrow>0?'c-yellow':'c-muted',click:()=>{setFilter('open');setSection('All');}},
       {l:'Overdue',v:overdue,c:overdue>0?'c-red':'c-muted',click:()=>{setFilter('open');setSection('All');}},
       {l:'Updated Today',v:updatedToday,c:'c-blue',click:()=>{}},
      ].map(({l,v,c,click})=>el('div',{key:l,className:'stat',style:{cursor:'pointer'},onClick:click},
        el('div',{className:'sl'},l),el('div',{className:`sv ${c}`},v),
      ))
    ),

    // Section tabs
    el('div',{style:{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}},
      ['All',...TASK_SECTIONS].map(s=>
        el('button',{key:s,className:`btn ${section===s?'b-blue':'b-ghost'}`,style:{padding:'6px 14px',fontSize:12},onClick:()=>setSection(s)},s)
      )
    ),

    // Status filter
    el('div',{className:'tabs'},
      [{id:'open',label:'Open'},{id:'done',label:'✓ Done'},{id:'archived',label:'📦 Archived'}].map(f=>
        el('button',{key:f.id,className:`tab ${filter===f.id?'on':''}`,onClick:()=>setFilter(f.id)},f.label)
      )
    ),

    // Task list - grouped by section
    visible.length===0?el('div',{className:'empty'},el('div',{className:'eico'},'✅'),el('div',{className:'etxt'},'No tasks found')):
    el('div',null,
      // Group by section
      (section==='All'?TASK_SECTIONS:[ section]).map(sec=>{
        const secTasks=visible.filter(t=>t.section===sec);
        if(secTasks.length===0) return null;
        return el('div',{key:sec,style:{marginBottom:20}},
          el('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:8}},
            el('div',{className:'fw6',style:{fontSize:13,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.8px'}},sec),
            el('span',{className:'badge bb-gray'},secTasks.length),
          ),
          el('div',{className:'card',style:{padding:0}},
            secTasks.map((task,i)=>
              el('div',{key:task.id,
                style:{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',borderBottom:i<secTasks.length-1?'1px solid var(--border)':'none',cursor:'pointer'},
                onClick:()=>setSelected(task),
              },
                // Status indicator
                el('div',{style:{width:16,height:16,borderRadius:'50%',border:`2px solid ${task.status==='done'?'var(--green)':'var(--border)'}`,background:task.status==='done'?'var(--green)':'transparent',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#fff'}},task.status==='done'?'✓':''),
                // Title and meta
                el('div',{style:{flex:1,minWidth:0}},
                  el('div',{className:'fw6',style:{fontSize:13,textDecoration:task.status==='done'?'line-through':'none',color:task.status==='done'?'var(--text3)':'var(--text)'}},task.title),
                  el('div',{style:{display:'flex',alignItems:'center',gap:8,marginTop:3}},
                    task.assigned_to&&el('span',{className:'tsm c-muted'},`👤 ${task.assigned_to}`),
                    (task.notes||[]).length>0&&el('span',{className:'tsm c-muted'},`💬 ${(task.notes||[]).length}`),
                  ),
                ),
                // Priority
                el('span',{className:`badge ${priColor(task.priority)}`},priLabel(task.priority)),
                // Due date
                task.due_date&&el('span',{className:`tsm fw6 ${getDueColor(task.due_date)}`,style:{whiteSpace:'nowrap'}},getDueLabel(task.due_date)),
              )
            )
          )
        );
      })
    ),

    // New Task Modal
    showNew&&el('div',{className:'mo',onClick:ev=>ev.target===ev.currentTarget&&setNew(false)},
      el('div',{className:'md'},
        el('div',{className:'mh'},el('div',{className:'mt2'},'New Task'),el('button',{className:'mc',onClick:()=>setNew(false)},'×')),
        el('div',{className:'mbd'},
          el('div',{className:'fg'},el('label',null,'Task Title'),el('input',{placeholder:'What needs to be done?',value:f.title,onChange:ev=>setF(p=>({...p,title:ev.target.value}))})),
          el('div',{className:'fg'},el('label',null,'Section'),el('select',{value:f.section,onChange:ev=>setF(p=>({...p,section:ev.target.value}))},TASK_SECTIONS.map(s=>el('option',{key:s,value:s},s)))),
          el('div',{className:'fg'},el('label',null,'Description'),
            el('textarea',{placeholder:'Add more details...',value:f.description,onChange:ev=>setF(p=>({...p,description:ev.target.value})),style:{width:'100%',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'var(--rs)',padding:'10px 13px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none',minHeight:80,resize:'vertical'}})
          ),
          el('div',{className:'g2'},
            el('div',{className:'fg',style:{marginBottom:0}},el('label',null,'Assign To'),el('select',{value:f.assigned_id,onChange:ev=>{const u=users.find(x=>x.id===ev.target.value);setF(p=>({...p,assigned_id:ev.target.value,assigned_to:u?.name||''}));}},el('option',{value:''},'— Unassigned —'),...users.filter(u=>u.approved).map(u=>el('option',{key:u.id,value:u.id},`${u.name} (${u.dept})`)))),
            el('div',{className:'fg',style:{marginBottom:0}},el('label',null,'Due Date'),el('input',{type:'date',value:f.due_date,onChange:ev=>setF(p=>({...p,due_date:ev.target.value}))})),
          ),
          el('div',{className:'fg'},el('label',null,'Priority'),
            el('div',{style:{display:'flex',gap:8}},
              Object.entries(TASK_PRIORITIES).map(([key,{label,color}])=>
                el('button',{key,className:`btn ${f.priority===key?'b-blue':'b-ghost'}`,style:{flex:1,fontSize:12,padding:'6px'},onClick:()=>setF(p=>({...p,priority:key}))},label)
              )
            )
          ),
        ),
        el('div',{className:'mf'},el('button',{className:'btn b-ghost',onClick:()=>setNew(false)},'Cancel'),el('button',{className:'btn b-blue',onClick:createTask,disabled:saving||!f.title},saving?'Creating...':'Create Task')),
      )
    ),

    // Task Detail Modal
    selected&&el('div',{className:'mo',onClick:ev=>ev.target===ev.currentTarget&&setSelected(null)},
      el('div',{className:'md',style:{width:660}},
        el('div',{className:'mh'},
          el('div',{style:{flex:1}},
            el('div',{style:{display:'flex',alignItems:'center',gap:8}},
              el('span',{className:`badge ${priColor(selected.priority)}`},priLabel(selected.priority)),
              el('span',{className:'badge bb-gray'},selected.section),
              selected.status==='done'&&el('span',{className:'badge bb-green'},'✓ Done'),
            ),
            el('div',{className:'mt2',style:{marginTop:8}},selected.title),
          ),
          el('button',{className:'mc',onClick:()=>setSelected(null)},'×'),
        ),
        el('div',{className:'mbd'},
          // Meta info
          el('div',{className:'g2 mb4'},
            el('div',null,
              el('div',{className:'tsm c-muted mb2'},'Assigned To'),
              el('select',{value:selected.assigned_id||'',onChange:ev=>{const u=users.find(x=>x.id===ev.target.value);updateField(selected,'assigned_to',u?.name||'');updateField({...selected,assigned_to:u?.name||''},'assigned_id',ev.target.value);},style:{width:'100%',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'var(--rs)',padding:'8px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13}},
                el('option',{value:''},'— Unassigned —'),
                ...users.filter(u=>u.approved).map(u=>el('option',{key:u.id,value:u.id},u.name))
              ),
            ),
            el('div',null,
              el('div',{className:'tsm c-muted mb2'},'Due Date'),
              el('input',{type:'date',value:selected.due_date||'',onChange:ev=>updateField(selected,'due_date',ev.target.value),style:{width:'100%',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'var(--rs)',padding:'8px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13}}),
            ),
          ),

          // Description
          el('div',{className:'fg'},
            el('label',null,'Description / Details'),
            el('textarea',{value:selected.description||'',onChange:ev=>updateField(selected,'description',ev.target.value),onBlur:ev=>updateField(selected,'description',ev.target.value),style:{width:'100%',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'var(--rs)',padding:'10px 13px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none',minHeight:100,resize:'vertical'}})
          ),

          // File attachment
          el('div',{className:'fg'},
            el('label',null,'Attach Document'),
            el('input',{type:'file',accept:'.pdf,.doc,.docx,.png,.jpg,.xlsx,.csv',onChange:async ev=>{
              const file=ev.target.files[0];if(!file)return;
              const reader=new FileReader();
              reader.onload=async re=>{
                const att={id:'att-'+Date.now(),name:file.name,type:file.type,data:re.target.result,by:cu.name,at:new Date().toISOString()};
                const newAtts=[...(selected.attachments||[]),att];
                await updateField(selected,'attachments',newAtts);
              };
              reader.readAsDataURL(file);
            },style:{width:'100%',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'var(--rs)',padding:'8px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13}}),
          ),

          // Attachments list
          (selected.attachments||[]).length>0&&el('div',{style:{marginBottom:14}},
            el('div',{className:'tsm fw6 mb2'},'Attachments:'),
            (selected.attachments||[]).map(att=>
              el('div',{key:att.id,style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 10px',background:'var(--surface2)',borderRadius:6,marginBottom:5}},
                el('span',{className:'tsm'},`📎 ${att.name}`),
                el('button',{className:'btn b-ghost btn-sm',onClick:()=>{const a=document.createElement('a');a.href=att.data;a.download=att.name;a.click();}},'Download'),
              )
            )
          ),

          el('div',{className:'divider'}),

          // Notes / Comments
          el('div',{className:'fw6 mb4'},'Notes & Comments'),
          (selected.notes||[]).length===0&&el('div',{className:'tsm c-muted mb4'},'No notes yet'),
          (selected.notes||[]).map(note=>
            el('div',{key:note.id,style:{background:'var(--surface2)',borderRadius:8,padding:'10px 12px',marginBottom:8}},
              el('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:4}},
                el('span',{className:'tsm fw6'},note.by),
                el('span',{className:'tsm c-muted'},note.at.slice(0,16).replace('T',' ')),
              ),
              el('div',{className:'tsm',style:{lineHeight:1.5}},note.text),
            )
          ),
          el('div',{style:{display:'flex',gap:8,marginTop:8}},
            el('input',{placeholder:'Add a note...',value:newNote,onChange:ev=>setNewNote(ev.target.value),onKeyDown:ev=>ev.key==='Enter'&&!ev.shiftKey&&addNote(),style:{flex:1,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'var(--rs)',padding:'9px 13px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none'}}),
            el('button',{className:'btn b-blue',onClick:addNote,disabled:!newNote.trim()},'Add'),
          ),

          // Meta footer
          el('div',{className:'divider'}),
          el('div',{style:{display:'flex',justifyContent:'space-between'}},
            el('div',{className:'tsm c-muted'},`Created by ${selected.created_by} · ${selected.created_at?.slice(0,10)}`),
            selected.updated_by&&el('div',{className:'tsm c-muted'},`Updated by ${selected.updated_by} · ${selected.updated_at?.slice(0,10)}`),
          ),
        ),

        // Action footer
        el('div',{className:'mf',style:{justifyContent:'space-between'}},
          el('div',{style:{display:'flex',gap:8}},
            selected.status==='open'&&(cu.role==='admin'||cu.role==='manager')&&el('button',{className:'btn b-green',onClick:()=>approve(selected)},'✓ Approve & Complete'),
            selected.status==='done'&&el('button',{className:'btn b-ghost',onClick:()=>archive(selected)},'📦 Move to Archive'),
            (cu.role==='admin')&&el('button',{className:'btn b-red',onClick:()=>deleteTask(selected.id)},'Delete'),
          ),
          el('button',{className:'btn b-ghost',onClick:()=>setSelected(null)},'Close'),
        ),
      )
    ),
  );
}

// ── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const[cu,setCu]=useState(()=>{try{const s=localStorage.getItem('pf_session');return s?JSON.parse(s):null;}catch{return null;}});
  const[page,setPage]=useState('dashboard');
  const[wos,setWos]=useState([]);
  const[inv,setInv]=useState([]);
  const[sops,setSops]=useState([]);
  const[users,setUsers]=useState([]);
  const[approvals,setApprovals]=useState([]);
  const[boms,setBoms]=useState([]);
  const[tasks,setTasks]=useState([]);
  const[loading,setLoading]=useState(false);
  const[dbReady,setDbReady]=useState(null); // null=checking, true=ready, false=needs setup

  // Check if DB is set up
  useEffect(()=>{
    db.get('pf_users','limit=1')
      .then(()=>setDbReady(true))
      .catch(()=>setDbReady(false));
  },[]);

  // Load data when logged in
  useEffect(()=>{
    if(!cu||!dbReady)return;
    setLoading(true);
    Promise.all([
      db.get('pf_work_orders','order=created.desc'),
      db.get('pf_inventory'),
      db.get('pf_sops','order=date.desc'),
      db.get('pf_users'),
      db.get('pf_approvals','order=created_at.desc').catch(()=>[]),
      db.get('pf_boms').catch(()=>[]),
      db.get('pf_tasks','order=created_at.desc').catch(()=>[]),
    ]).then(([w,i,s,u,a,b,t])=>{
      setWos(w.map(x=>({...x,assignedTo:x.assigned_to,holdReason:x.hold_reason,leadStage:x.lead_stage,stage_counts:x.stage_counts||{},stage_wastes:x.stage_wastes||{}})));
      setApprovals(a||[]);
      setBoms(b||[]);
      setTasks(t||[]);
      setInv(i);setSops(s);
      setUsers(u.map(x=>({...x,leadStage:x.lead_stage})));
    }).catch(console.error).finally(()=>setLoading(false));
  },[cu,dbReady]);

  if(dbReady===null)return el('div',{className:'loading'},el('div',{className:'spinner'}),el('div',null,'Connecting to database...'));
  if(dbReady===false)return el(SetupScreen,{onDone:()=>setDbReady(true)});
  if(!cu)return el(Auth,{onLogin:setCu});
  if(loading)return el('div',{className:'loading'},el('div',{className:'spinner'}),el('div',null,'Loading your data...'));

  const pending=users.filter(u=>!u.approved).length;
  const lowInv=inv.filter(i=>i.qty<=i.min_qty).length;
  const pendSops=sops.filter(s=>(s.depts||[]).includes(cu.dept)&&!(s.acks||{})[cu.id]?.signed).length;
  const holdCt=wos.filter(w=>w.hold).length;

  const nav=[
    {id:'dashboard',ico:'🏠',label:'Dashboard'},
    hp(cu,'view_work_orders')&&{id:'orders',ico:'📋',label:'Work Orders',badge:holdCt||null},
    hp(cu,'view_inventory')&&{id:'inventory',ico:'📦',label:'Inventory',badge:lowInv||null},
    (hp(cu,'view_qms')||hp(cu,'sign_sops')||cu.role==='employee'||cu.role==='lead')&&{id:'qms',ico:'📄',label:'QMS / SOPs',badge:pendSops||null},
    cu.role==='admin'&&{id:'team',ico:'👥',label:'Team & Access',badge:pending||null},
    cu.role==='admin'&&{id:'approvals',ico:'📨',label:'Approvals',badge:(approvals||[]).filter(a=>a.status==='pending').length||null},
    cu.role==='admin'&&{id:'bom',ico:'📐',label:'Bill of Materials'},
    {id:'completed',ico:'🏁',label:'Completed Batches'},
  ].filter(Boolean);

  return el('div',{className:'app'},
    el('div',{className:'sb'},
      el('div',{className:'sb-logo'},'Pro',el('span',null,'Flow')),
      el('div',{className:'sb-section'},
        el('div',{className:'sb-label'},'Navigation'),
        nav.map(item=>el('button',{key:item.id,className:`nav ${page===item.id?'on':''}`,onClick:()=>setPage(item.id)},el('span',null,item.ico),item.label,item.badge&&el('span',{className:'dot'},item.badge)))
      ),
      el('div',{className:'sb-user'},
        el('div',{className:'sb-name'},cu.name),
        el('div',{className:'sb-role'},`${RLABEL[cu.role]} · ${cu.dept}`),
        el('div',{className:'sb-role',style:{marginTop:2}},cu.loc),
        el('button',{className:'sb-out',onClick:()=>{localStorage.removeItem('pf_session');setCu(null);}},'Sign out'),
      )
    ),
    el('div',{className:'main'},
      page==='dashboard'&&el(Dashboard,{wos,inv,users,cu,setPage,approvals}),
      page==='tasks'&&el(Tasks,{tasks,setTasks,cu,users}),
      page==='orders'&&el(WorkOrders,{wos,setWos,cu,users,inv,boms}),
      page==='inventory'&&el(Inventory,{inv,setInv,cu,boms}),
      page==='qms'&&el(QMS,{sops,setSops,cu,users}),
      page==='team'&&el(Team,{users,setUsers,cu}),
      page==='approvals'&&el(Approvals,{approvals,setApprovals,wos,setWos,cu}),
      page==='bom'&&el(BOMBuilder,{boms,setBoms,inv,cu}),
      page==='completed'&&el(CompletedBatches,{wos}),
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(el(App));
</script>
</body>
</html>
