        el('button',{className:'btn b-blue',onClick:()=>setNew(true)},'+ New Event'),
      ),
    ),
    view==='month'&&el('div',null,
      el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}},
        el('button',{className:'btn b-ghost',onClick:()=>setCur(d=>new Date(d.getFullYear(),d.getMonth()-1,1))},'\u2190'),
        el('div',{style:{fontSize:18,fontWeight:700}},monthLabel),
        el('div',{style:{display:'flex',gap:8}},
          el('button',{className:'btn b-ghost btn-sm',onClick:()=>setCur(new Date())},'Today'),
          el('button',{className:'btn b-ghost',onClick:()=>setCur(d=>new Date(d.getFullYear(),d.getMonth()+1,1))},'\u2192'),
        ),
      ),
      el('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}},
        WEEKDAYS.map(d=>el('div',{key:d,style:{textAlign:'center',fontSize:11,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.8px',padding:'6px 0'}},d))
      ),
      el('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}},
        days.map((day,i)=>{
          if(!day) return el('div',{key:'empty-'+i,style:{minHeight:80,background:'var(--surface2)',borderRadius:6,opacity:.3}});
          const ds=day.toISOString().slice(0,10);
          const dayEvts=getEventsForDate(day);
          const isToday=ds===today;

            onClick:()=>{setF(p=>({...p,date:ds}));setNew(true);},

// \u2500\u2500 PULL TO REFRESH \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function usePullToRefresh(onRefresh){
  useEffect(()=>{
    let startY=0,pulling=false;
    function touchStart(e){if(window.scrollY===0)startY=e.touches[0].clientY;}
    function touchMove(e){
      if(!startY)return;
      const dy=e.touches[0].clientY-startY;
      const ind=document.getElementById('ptr-indicator');
      if(dy>10&&dy<100&&ind){pulling=true;ind.style.display='flex';ind.style.opacity=String(Math.min(dy/60,1));ind.style.transform='translateY('+Math.min(dy-10,50)+'px)';}
    }
    function touchEnd(){
      const ind=document.getElementById('ptr-indicator');
      if(pulling&&ind){
        const dy=parseInt((ind.style.transform||'').replace('translateY(','').replace('px)',''))||0;
        if(dy>35){
          ind.innerHTML='<div style="animation:spin .6s linear infinite;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%"></div><span style="margin-left:8px">Refreshing...</span>';
          setTimeout(()=>{onRefresh();ind.style.display='none';ind.style.opacity='0';},600);
        }else{ind.style.display='none';}
      }
      startY=0;pulling=false;
    }
    document.addEventListener('touchstart',touchStart,{passive:true});
    document.addEventListener('touchmove',touchMove,{passive:true});
    document.addEventListener('touchend',touchEnd);
    return()=>{document.removeEventListener('touchstart',touchStart);document.removeEventListener('touchmove',touchMove);document.removeEventListener('touchend',touchEnd);};
  },[onRefresh]);
}

  const PURPOSES=['Vendor / delivery','Maintenance / repair','Regulatory inspection (DCR)','Regulatory inspection (other)','Audit','Business meeting','Prospective employee','Other'];

  // Camera for selfie
  async function startCamera(){
    try{
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
      if(videoRef.current){videoRef.current.srcObject=stream;videoRef.current.play();}
      setCameraActive(true);
    }catch(e){alert('Camera not available. You can skip the selfie.');}
  }
  function takeSelfie(){
    const canvas=document.createElement('canvas');
    canvas.width=320;canvas.height=240;
    canvas.getContext('2d').drawImage(videoRef.current,0,0,320,240);
    setSelfie(canvas.toDataURL('image/jpeg',0.7));
    if(videoRef.current?.srcObject){videoRef.current.srcObject.getTracks().forEach(t=>t.stop());}
    setCameraActive(false);
  }
  function retakeSelfie(){setSelfie(null);startCamera();}

  // Sign In
  async function submitSignIn(){
    if(!form.visitor_name.trim()){alert('Please enter your full name.');return;}
    if(!sig){alert('Please draw your signature.');return;}
    setSaving(true);
    const rec={
      id:'vis-'+Date.now(),log_type:'visitor',
      date:new Date().toISOString().slice(0,10),
      time_in:new Date().toTimeString().slice(0,5),
      time_out:'',
      visitor_name:form.visitor_name.trim(),
      visitor_company:form.visitor_company,
      visitor_id:form.visitor_id,
      purpose:form.purpose,
      escorted_by:form.escorted_by,
      areas_accessed:form.areas_accessed,
      notes:form.notes,
      signature_image:sig,
      selfie_image:selfie||null,
      submitted_by:form.visitor_name.trim(),
      submitted_by_id:'kiosk',
      created_at:new Date().toISOString(),
    };
    try{
      const res=await fetch(`${SUPA_URL}/rest/v1/pf_log_visitor`,{
        method:'POST',headers:{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Prefer':'return=representation'},
        body:JSON.stringify(rec),
      });
      if(!res.ok){const e=await res.json();throw new Error(e.message||'Save failed');}
      setExistingVisit(rec);
      setStep('done');
    }catch(e){alert('Error: '+e.message);}
    setSaving(false);
  }

  // Look up visitor for sign out
  async function lookupVisitor(){
    if(!lookupName.trim()){return;}
    setLookupError('');setLookupResult(null);
    try{
      const res=await fetch(`${SUPA_URL}/rest/v1/pf_log_visitor?visitor_name=ilike.*${encodeURIComponent(lookupName.trim())}*&time_out=eq.&order=created_at.desc&limit=1`,{
        headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Accept':'application/json'},
      });
      const rows=await res.json();
      if(!rows||rows.length===0){setLookupError('No active sign-in found for "'+lookupName+'". Please check the spelling.');return;}
      setLookupResult(rows[0]);
    }catch(e){setLookupError('Error: '+e.message);}
  }

  async function submitSignOut(){
    if(!sig){alert('Please draw your signature to sign out.');return;}
    if(!lookupResult){return;}
    setSaving(true);
    try{
      await fetch(`${SUPA_URL}/rest/v1/pf_log_visitor?id=eq.${lookupResult.id}`,{
        method:'PATCH',
        headers:{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY},
        body:JSON.stringify({time_out:new Date().toTimeString().slice(0,5),signout_signature:sig}),
      });
      setStep('done');
    }catch(e){alert('Error: '+e.message);}
    setSaving(false);
  }

  const CARD_STYLE={background:'#ffffff',borderRadius:16,padding:'28px 24px',boxShadow:'0 4px 24px rgba(15,23,42,.12)',width:'100%',maxWidth:480,margin:'0 auto'};

  return el('div',{style:{minHeight:'100vh',background:'linear-gradient(135deg,#1e3a5f 0%,#2d5282 100%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'24px 16px',fontFamily:'Inter,sans-serif'}},

    // Header
    el('div',{style:{textAlign:'center',marginBottom:28,color:'#fff'}},
      el('div',{style:{fontSize:36,marginBottom:4}},'\uD83E\uDD8A'),
      el('div',{style:{fontSize:22,fontWeight:800,letterSpacing:'-0.5px'}},['BLACK FOX QMS'].join('')),
      el('div',{style:{fontSize:13,opacity:.75,marginTop:2}},'Visitor Management \u00B7 Black Fox Manufacturing'),
    ),

    // CHOICE SCREEN
    step==='choice'&&el('div',{style:CARD_STYLE},
      el('div',{style:{fontSize:18,fontWeight:700,color:'#0f172a',marginBottom:6,textAlign:'center'}},'Welcome'),
      el('div',{style:{fontSize:13,color:'#475569',marginBottom:24,textAlign:'center'}},'Please select an option below'),
      el('button',{
        onClick:()=>setStep('signin'),
        style:{width:'100%',background:'#1e3a5f',color:'#fff',border:'none',borderRadius:12,padding:'18px',fontFamily:'inherit',fontSize:16,fontWeight:700,cursor:'pointer',marginBottom:12,display:'flex',alignItems:'center',justifyContent:'center',gap:10}
      },el('span',{style:{fontSize:24}},'\uD83D\uDC4B'),'Sign In \u2014 I am arriving'),
      el('button',{
        onClick:()=>setStep('signout'),
        style:{width:'100%',background:'#f0f9ff',color:'#1e3a5f',border:'2px solid #1e3a5f',borderRadius:12,padding:'18px',fontFamily:'inherit',fontSize:16,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10}
      },el('span',{style:{fontSize:24}},'\uD83D\uDEAA'),'Sign Out \u2014 I am leaving'),
    ),

    // SIGN IN SCREEN
    step==='signin'&&el('div',{style:{...CARD_STYLE,maxWidth:520}},
      el('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:20}},
        el('button',{onClick:()=>setStep('choice'),style:{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'#64748b'}},el('span',null,'\u2190')),
        el('div',{style:{fontSize:18,fontWeight:700,color:'#0f172a'}},'Visitor Sign In'),
      ),

      // Selfie
      el('div',{style:{marginBottom:20,textAlign:'center'}},
        selfie
          ?el('div',null,
              el('img',{src:selfie,style:{width:120,height:90,objectFit:'cover',borderRadius:12,border:'3px solid #1e3a5f',marginBottom:8}}),
              el('div',null,el('button',{onClick:retakeSelfie,style:{background:'none',border:'1px solid #cbd5e1',borderRadius:8,padding:'4px 12px',fontSize:12,cursor:'pointer',color:'#64748b'}},'Retake Photo')),
            )
          :cameraActive
            ?el('div',null,
                el('video',{ref:videoRef,autoPlay:true,playsInline:true,style:{width:'100%',maxWidth:320,borderRadius:12,marginBottom:8}}),
                el('button',{onClick:takeSelfie,style:{background:'#1e3a5f',color:'#fff',border:'none',borderRadius:10,padding:'10px 24px',fontFamily:'inherit',fontSize:14,fontWeight:700,cursor:'pointer'}},'\uD83D\uDCF8 Take Photo'),
              )
            :el('button',{onClick:startCamera,style:{background:'#f1f5f9',border:'2px dashed #cbd5e1',borderRadius:12,padding:'16px 32px',fontFamily:'inherit',fontSize:13,color:'#64748b',cursor:'pointer',width:'100%'}},
                '\uD83D\uDCF8 Take a Selfie (Optional)',
              ),
      ),

      // Form fields
      [
        {k:'visitor_name',l:'Full Name *',ph:'Your full name',t:'text'},
        {k:'visitor_company',l:'Company / Organization',ph:'Who do you represent?',t:'text'},
        {k:'visitor_id',l:'ID Number',ph:'Driver\'s license or ID number',t:'text'},
        {k:'escorted_by',l:'Escorted By',ph:'Employee meeting you',t:'text'},
        {k:'areas_accessed',l:'Areas You Will Visit',ph:'e.g. Reception, Production Floor',t:'text'},
        {k:'notes',l:'Notes',ph:'Reason for visit or additional info',t:'textarea'},
      ].map(({k,l,ph,t})=>el('div',{key:k,style:{marginBottom:14}},
        el('label',{style:{fontSize:12,fontWeight:700,color:'#0f172a',display:'block',marginBottom:5}},l),
        t==='textarea'
          ?el('textarea',{value:form[k],onChange:ev=>setF(k,ev.target.value),placeholder:ph,rows:2,style:{width:'100%',border:'1px solid #cbd5e1',borderRadius:8,padding:'10px 12px',fontFamily:'inherit',fontSize:14,color:'#0f172a',resize:'vertical',boxSizing:'border-box'}})
          :el('input',{type:t,value:form[k],onChange:ev=>setF(k,ev.target.value),placeholder:ph,style:{width:'100%',border:'1px solid #cbd5e1',borderRadius:8,padding:'10px 12px',fontFamily:'inherit',fontSize:14,color:'#0f172a',boxSizing:'border-box'}}),
      )),

      // Purpose
      el('div',{style:{marginBottom:14}},
        el('label',{style:{fontSize:12,fontWeight:700,color:'#0f172a',display:'block',marginBottom:5}},'Purpose of Visit *'),
        el('select',{value:form.purpose,onChange:ev=>setF('purpose',ev.target.value),style:{width:'100%',border:'1px solid #cbd5e1',borderRadius:8,padding:'10px 12px',fontFamily:'inherit',fontSize:14,color:'#0f172a',background:'#fff'}},
          PURPOSES.map(p=>el('option',{key:p,value:p},p))
        ),
      ),

      // Signature
      el('div',{style:{marginBottom:20}},
        el('div',{style:{fontSize:13,fontWeight:700,color:'#0f172a',marginBottom:8}},'\u270D\uFE0F Signature *'),
        sig
          ?el('div',null,el('img',{src:sig,style:{border:'1px solid #cbd5e1',borderRadius:8,maxWidth:'100%',height:80}}),el('button',{onClick:()=>setSig(null),style:{marginLeft:8,background:'none',border:'1px solid #cbd5e1',borderRadius:6,padding:'4px 10px',fontSize:12,cursor:'pointer'}},'Clear'))
          :el(SignaturePad,{label:'Sign here to confirm your visit',onSave:dataUrl=>setSig(dataUrl),onClear:()=>setSig(null)}),
      ),

      el('div',{style:{fontSize:11,color:'#94a3b8',marginBottom:14,lineHeight:1.5}},'By signing, you confirm you have read and will follow all facility safety, security, and compliance rules. This visit is being logged for regulatory compliance.'),

      el('button',{onClick:submitSignIn,disabled:saving,style:{width:'100%',background:saving?'#94a3b8':'#1e3a5f',color:'#fff',border:'none',borderRadius:12,padding:'16px',fontFamily:'inherit',fontSize:16,fontWeight:700,cursor:saving?'not-allowed':'pointer'}},saving?'Saving...':'\u2705 Sign In'),
    ),

    // SIGN OUT SCREEN
    step==='signout'&&el('div',{style:CARD_STYLE},
      el('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:20}},
        el('button',{onClick:()=>{setStep('choice');setLookupName('');setLookupResult(null);setLookupError('');setSig(null);},style:{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'#64748b'}},'\u2190'),
        el('div',{style:{fontSize:18,fontWeight:700,color:'#0f172a'}},'Sign Out'),
      ),
      !lookupResult?el('div',null,
        el('div',{style:{fontSize:14,color:'#475569',marginBottom:16}},'Enter your name to find your sign-in record:'),
        el('input',{type:'text',value:lookupName,onChange:ev=>setLookupName(ev.target.value),onKeyDown:ev=>ev.key==='Enter'&&lookupVisitor(),placeholder:'Your full name',autoFocus:true,style:{width:'100%',border:'1px solid #cbd5e1',borderRadius:8,padding:'12px',fontFamily:'inherit',fontSize:16,color:'#0f172a',boxSizing:'border-box',marginBottom:12}}),
        lookupError&&el('div',{style:{color:'#dc2626',fontSize:13,marginBottom:8}},lookupError),
        el('button',{onClick:lookupVisitor,style:{width:'100%',background:'#1e3a5f',color:'#fff',border:'none',borderRadius:10,padding:'14px',fontFamily:'inherit',fontSize:15,fontWeight:700,cursor:'pointer'}},'Find My Visit \u2192'),
      ):el('div',null,
        el('div',{style:{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:10,padding:'14px',marginBottom:16}},
          el('div',{style:{fontSize:13,fontWeight:700,color:'#16a34a',marginBottom:4}},'\u2713 Visit Found'),
          el('div',{style:{fontSize:14,fontWeight:700,color:'#0f172a'}},lookupResult.visitor_name),
          el('div',{style:{fontSize:12,color:'#475569'}},'Signed in: '+lookupResult.date+' at '+lookupResult.time_in),
          el('div',{style:{fontSize:12,color:'#475569'}},'Purpose: '+lookupResult.purpose),
        ),
        el('div',{style:{fontSize:13,fontWeight:700,color:'#0f172a',marginBottom:8}},'\u270D\uFE0F Sign to confirm departure'),
        sig
          ?el('div',null,el('img',{src:sig,style:{border:'1px solid #cbd5e1',borderRadius:8,maxWidth:'100%',height:80}}),el('button',{onClick:()=>setSig(null),style:{marginLeft:8,background:'none',border:'1px solid #cbd5e1',borderRadius:6,padding:'4px 10px',fontSize:12,cursor:'pointer'}},'Clear'))
          :el(SignaturePad,{label:'Sign to confirm you are leaving',onSave:dataUrl=>setSig(dataUrl),onClear:()=>setSig(null)}),
        el('button',{onClick:submitSignOut,disabled:saving,style:{width:'100%',background:saving?'#94a3b8':'#1e3a5f',color:'#fff',border:'none',borderRadius:12,padding:'16px',fontFamily:'inherit',fontSize:16,fontWeight:700,cursor:saving?'not-allowed':'pointer',marginTop:16}},saving?'Saving...':'\uD83D\uDEAA Complete Sign Out'),
      ),
    ),

    // DONE SCREEN
    step==='done'&&el('div',{style:CARD_STYLE},
      el('div',{style:{textAlign:'center'}},
        el('div',{style:{fontSize:60,marginBottom:12}},'\u2705'),
        el('div',{style:{fontSize:22,fontWeight:800,color:'#16a34a',marginBottom:8}},step==='done'&&lookupResult?'Signed Out Successfully':'Signed In Successfully'),
        el('div',{style:{fontSize:14,color:'#475569',marginBottom:8}},new Date().toLocaleString()),
        el('div',{style:{fontSize:13,color:'#64748b',marginBottom:24,lineHeight:1.6}},'Thank you. Your visit has been logged and signed.\nA staff member will assist you shortly.'),
        el('button',{onClick:()=>{setStep('choice');setForm({visitor_name:'',visitor_company:'',visitor_id:'',purpose:'Vendor / delivery',escorted_by:'',areas_accessed:'',notes:''});setSig(null);setSelfie(null);setLookupName('');setLookupResult(null);setLookupError('');},style:{background:'#1e3a5f',color:'#fff',border:'none',borderRadius:10,padding:'12px 32px',fontFamily:'inherit',fontSize:14,fontWeight:700,cursor:'pointer'}},'\u2190 Back to Start'),
      ),
    ),
  );
}

function App(){
  // Kiosk mode \u2014 no login needed, accessible via QR code
  const urlParams=new URLSearchParams(window.location.search);
  if(urlParams.get('kiosk')==='visitor') return el(VisitorKiosk,null);

  const[cu,setCu]=useState(()=>{try{const s=localStorage.getItem('pf_session');return s?JSON.parse(s):null;}catch{return null;}});
  const[tasks,setTasks]=useState([]);
  const[salesTasks,setSalesTasks]=useState([]);
  const[events,setEvents]=useState([]);
  const[meetingNotes,setMeetingNotes]=useState([]);
  const[users,setUsers]=useState([]);
  const[sops,setSops]=useState([]);
  const[qmsDeviations,setQmsDeviations]=useState([]);
  const[qmsCAPAs,setQmsCAPAs]=useState([]);
  const[qmsAudits,setQmsAudits]=useState([]);
  const[qmsChanges,setQmsChanges]=useState([]);
  const[qmsComplaints,setQmsComplaints]=useState([]);
  const[qmsSuppliers,setQmsSuppliers]=useState([]);
  const[qmsCorrective,setQmsCorrective]=useState([]);
  const[loading,setLoading]=useState(false);
  const[dbReady,setDbReady]=useState(null);
  const[page,setPage]=useState('board');
  const[holdAlert,setHoldAlert]=useState(null);
  const[inviteAlert,setInviteAlert]=useState(null);
  const[activeCall,setActiveCall]=useState(null);
  const[installPrompt,setInstallPrompt]=useState(null);
  const[showInstallBanner,setShowInstallBanner]=useState(false);

  // Capture the beforeinstallprompt event for PWA install
  React.useEffect(()=>{
    if(!cu)return;
    const dismissed=localStorage.getItem('bfm_install_dismissed');
    const isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
    if(!isStandalone&&!dismissed){
      setTimeout(()=>setShowInstallBanner(true),3000);
    }
  },[cu]);
  const[locFilter,setLocFilter]=useState(()=>{try{const s=localStorage.getItem('pf_session');const u=s?JSON.parse(s):null;return u?.loc==='Michigan'?'Missouri':u?.loc||'Nationwide';}catch{return 'Nationwide';}});

  // FIX 2: doRefresh with correct destructuring
  const doRefresh=useCallback(()=>{
    if(!cu||!dbReady)return;
    Promise.all([
      db.get('pf_tasks','order=created_at.desc').catch(()=>[]),
      db.get('pf_sales_tasks','order=created_at.desc').catch(()=>[]),
      db.get('pf_users').catch(()=>[]),
      db.get('pf_events','order=date.asc').catch(()=>[]),
      db.get('pf_meeting_notes','order=created_at.desc').catch(()=>[]),
      db.get('pf_sops','order=created_at.desc').catch(()=>[]),
      db.get('pf_qms_deviations','order=created_at.desc').catch(()=>[]),
      db.get('pf_qms_capas','order=created_at.desc').catch(()=>[]),
      db.get('pf_qms_audits','order=created_at.desc').catch(()=>[]),
      db.get('pf_qms_changes','order=created_at.desc').catch(()=>[]),
      db.get('pf_qms_complaints','order=created_at.desc').catch(()=>[]),
      db.get('pf_qms_suppliers','order=created_at.desc').catch(()=>[]),
      db.get('pf_qms_corrective','order=created_at.desc').catch(()=>[]),
    ]).then(([_tasks,_sales,_users,_events,_notes,_sops,_dev,_cap,_aud,_chg,_comp,_sup,_corr])=>{
      setTasks(_tasks||[]);
      setSalesTasks(_sales||[]);
      setUsers(_users||[]);
      setEvents(_events||[]);
      setMeetingNotes(_notes||[]);
      setSops(_sops||[]);
      setQmsDeviations(_dev||[]);
      setQmsCAPAs(_cap||[]);
      setQmsAudits(_aud||[]);
      setQmsChanges(_chg||[]);
      setQmsComplaints(_comp||[]);
      setQmsSuppliers(_sup||[]);
      setQmsCorrective(_corr||[]);
    });
  },[cu,dbReady]);

  usePullToRefresh(doRefresh);

  // Auto-refresh every 30 seconds
  useEffect(()=>{
    if(!cu||!dbReady) return;
    const interval=setInterval(()=>doRefresh(),2*60*1000);
    return()=>clearInterval(interval);
  },[cu,dbReady,doRefresh]);

  useEffect(()=>{
    db.get('pf_users','limit=1').then(()=>setDbReady(true)).catch(()=>setDbReady(false));
  },[]);

  useEffect(()=>{
    if(!cu)return;
    let timer;
    const reset=()=>{
      clearTimeout(timer);
      timer=setTimeout(()=>{localStorage.removeItem('pf_session');setCu(null);alert('You have been signed out due to inactivity.');},30*60*1000);
    };
    const evts=['mousemove','keydown','click','touchstart','scroll'];
    evts.forEach(e=>window.addEventListener(e,reset,{passive:true}));
    reset();
    return()=>{clearTimeout(timer);evts.forEach(e=>window.removeEventListener(e,reset));};
  },[cu]);

  // FIX 1: main data load with correct destructuring
  useEffect(()=>{
    if(!cu||!dbReady)return;
    // Ask for notification permission immediately on login
    if('Notification' in window&&Notification.permission==='default'){
      Notification.requestPermission().then(p=>{
        if(p==='granted'){
          new Notification('\uD83D\uDD14 Black Fox QMS',{body:'Black Fox QMS notifications enabled!',icon:'/BFM/icon-192.png'});
        }
      });
    }
    setTimeout(()=>requestPushPermission(cu.id),2000);
    setLoading(true);
    Promise.all([
      db.get('pf_tasks','order=created_at.desc').catch(()=>[]),
      db.get('pf_sales_tasks','order=created_at.desc').catch(()=>[]),
      db.get('pf_users').catch(()=>[]),
      db.get('pf_events','order=date.asc').catch(()=>[]),
      db.get('pf_meeting_notes','order=created_at.desc').catch(()=>[]),
      db.get('pf_sops','order=created_at.desc').catch(()=>[]),
    ]).then(([_tasks,_sales,_users,_events,_notes,_sops])=>{
      setTasks(_tasks||[]);
      setSalesTasks(_sales||[]);
      setUsers(_users||[]);
      setEvents(_events||[]);
      setMeetingNotes(_notes||[]);
      setSops(_sops||[]);
    }).catch(console.error).finally(()=>setLoading(false));
    db.get('pf_tasks','status=eq.on_hold&order=updated_at.desc').then(held=>{
      const myHeld=(held||[]).filter(t=>(t.assignees||[]).some(a=>a.id===cu?.id)&&!sessionStorage.getItem('hold-dismissed-'+t.id));
      if(myHeld.length>0) setHoldAlert(myHeld[0]);
    }).catch(()=>{});
  },[cu,dbReady]);

  // Detect pending calendar/meeting invites for this user and surface a one-time popup,
  // same pattern as the on-hold task alert.
  useEffect(()=>{
    if(!cu||!events||events.length===0) return;
    const myPending=events.filter(e=>
      e.created_by_id!==cu.id&&
      (e.attendee_status||{})[cu.id]==='pending'&&
      !sessionStorage.getItem('invite-dismissed-'+e.id)
    );
    if(myPending.length>0) setInviteAlert(myPending[0]);
  },[events,cu]);

  if(dbReady===null) return el('div',{className:'loading'},el('div',{className:'spinner'}),el('div',null,'Connecting...'));
  if(dbReady===false) return el(SetupScreen,{onDone:()=>setDbReady(true)});
  if(!cu) return el(Auth,{onLogin:u=>{setCu(u);setLocFilter(u.loc||'Nationwide');}});
  if(loading) return el('div',{className:'loading'},el('div',{className:'spinner'}),el('div',null,'Loading...'));

  const pending=users.filter(u=>!u.approved).length;
  const isAdmin=cu.role==='admin';
  const isElevated=isAdmin||['coo','director_production','director_operations','director_sales_marketing','general_manager','compliance_manager'].includes(cu.role);
  // QMS access: Admin, Managers, and Supervisors. Employees, Leads, and Staff
  // get SOPs only (per Black Fox QMS QMS RBAC policy).
  const qmsRoleGroup=ROLE_GROUPS.find(g=>g.roles.includes(cu.role))?.label;
  const canAccessQms=isAdmin||['Executive','Directors','Managers'].includes(qmsRoleGroup);
  const today=new Date().toISOString().slice(0,10);
  const myTasks=tasks.filter(t=>(t.assignees||[]).some(a=>a.id===cu.id)&&!['archived'].includes(t.status));
  const overdueCt=tasks.filter(t=>!['done','archived'].includes(t.status)&&t.due_date&&t.due_date<today).length;

  const nav=[
    {id:'board',ico:'\u2B1B',label:'Task Board'},
    {id:'calendar',ico:'\uD83D\uDCC5',label:'Calendar'},
    (cu.role==='admin'||cu.dept==='Sales'||cu.dept==='Marketing')&&{id:'sales',ico:'\uD83C\uDFEA',label:'Sales & Marketing'},
    {id:'sops',ico:'\uD83D\uDCCB',label:'SOPs'},
    canAccessQms&&{id:'qms',ico:'\uD83D\uDEE1\uFE0F',label:'QMS'},
    canAccessQms&&{id:'compliance',ico:'\u2705',label:'Compliance'},
    canAccessQms&&{id:'risks',ico:'\u26A0\uFE0F',label:'Risk Register'},
    {id:'logs',ico:'\uD83D\uDCCB',label:'Facility Logs'},
    {id:'mydocs',ico:'\uD83D\uDCC1',label:'My Documents'},
    {id:'scores',ico:'\uD83C\uDFC6',label:'Scoreboard'},
    isAdmin&&{id:'team',ico:'\uD83D\uDC65',label:'Team & Access',badge:pending||null},
  ].filter(Boolean);

  return el('div',{className:'app'},
    el('div',{className:'sb'},

<script>
if('serviceWorker' in navigator && window.location.hostname !== 'www.claudeusercontent.com'){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/BFM/sw.js')
      .then(reg => {
        console.log('SW registered');
        setInterval(() => reg.update(), 30 * 60 * 1000);
        reg.addEventListener('updatefound', () => {
          const newSW = reg.installing;
          newSW.addEventListener('statechange', () => {
            if(newSW.state === 'installed' && navigator.serviceWorker.controller) {
              const banner = document.getElementById('update-banner');
              if(banner) banner.style.display = 'flex';
            }
          });
        });
      })
      .catch(e => console.log('SW failed:', e));
    navigator.serviceWorker.addEventListener('message', ev => {
      if(ev.data?.type === 'SW_UPDATED') {
        const banner = document.getElementById('update-banner');
        if(banner) banner.style.display = 'flex';
      }
    });
  });
}
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  setTimeout(() => {
    if(deferredPrompt) {
      const banner = document.createElement('div');
      banner.id = 'install-banner';
      banner.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e3a5f;color:#ffffff;padding:12px 20px;border-radius:12px;font-family:Inter,sans-serif;font-size:13px;font-weight:700;cursor:pointer;z-index:9999;box-shadow:0 8px 24px rgba(30,58,95,.3);display:flex;align-items:center;gap:10px;';
      banner.innerHTML = '<span>📱</span><span>Add Black Fox QMS to Home Screen</span><span style="margin-left:8px;opacity:.6">×</span>';
      banner.onclick = (e) => {
        if(e.target.textContent === '×') { banner.remove(); return; }
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => { deferredPrompt = null; banner.remove(); });
      };
      document.body.appendChild(banner);
    }
  }, 3000);
});
</script>
